name: Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential rpm

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: cmake ..

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Package with CPack
        working-directory: build
        run: |
          cpack -G DEB
          cpack -G RPM
          # Create a folder to collect all packages for easy uploading
          mkdir -p ../packages
          cp *.deb ../packages/ || true
          cp *.rpm ../packages/ || true

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: prism-linux-packages
          path: packages/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: choco install cmake -y

      - name: Create build directory
        run: mkdir -Force build

      - name: Configure CMake
        working-directory: build
        run: cmake ..

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows
          path: build/Release/prism.exe
