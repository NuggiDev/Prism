name: Build & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: prism
            artifact_path: build/Release/prism
          - os: macos-latest
            artifact_name: prism
            artifact_path: build/Release/prism
          - os: windows-latest
            artifact_name: prism.exe
            artifact_path: build/Release/prism.exe
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake
      
      - name: Get CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  package:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      
      - name: List downloaded artifacts
        run: find . -type f -name prism* | head -20
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Copy Windows binary
        run: |
          if [ -f "prism-windows-latest/prism.exe" ]; then
            cp prism-windows-latest/prism.exe release/prism.exe
          fi
      
      - name: Copy macOS binary and create DMG
        if: always()
        run: |
          if [ -f "prism-macos-latest/prism" ]; then
            chmod +x prism-macos-latest/prism
            mkdir -p dmg_temp/Prism.app/Contents/MacOS
            cp prism-macos-latest/prism dmg_temp/Prism.app/Contents/MacOS/
            hdiutil create -volname "Prism" -srcfolder dmg_temp -ov -format UDZO release/prism.dmg
          fi
      
      - name: Create Linux packages
        if: always()
        run: |
          if [ -f "prism-ubuntu-latest/prism" ]; then
            chmod +x prism-ubuntu-latest/prism
            
            # DEB package
            mkdir -p deb/usr/local/bin
            cp prism-ubuntu-latest/prism deb/usr/local/bin/
            mkdir -p deb/DEBIAN
            cat > deb/DEBIAN/control << 'CONTROL'
Package: prism
Version: 1.0.0
Architecture: amd64
Maintainer: NuggiDev <annalisatorcello9@gmail.com>
Description: Universal build system detection tool
CONTROL
            dpkg-deb --build deb release/prism.deb
            
            # RPM package (using fpm)
            sudo apt-get update && sudo apt-get install -y ruby ruby-dev
            sudo gem install fpm
            mkdir -p rpm/usr/local/bin
            cp prism-ubuntu-latest/prism rpm/usr/local/bin/
            fpm -s dir -t rpm -n prism -v 1.0.0 -C rpm -p release/prism.rpm usr
          fi
      
      - name: List release artifacts
        run: ls -lah release/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
